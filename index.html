<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Event Organizer | Profesional & Terpercaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">Elite<span>Events</span></div>
            <ul class="nav-links">
                <li><a href="#services">Layanan</a></li>
                <li><a href="#register">Pendaftaran</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="services" class="section">
            <div class="section-title">
                <h2>Layanan Eksklusif Kami</h2>
                <p>Kelola acara Anda dengan sentuhan profesional.</p>
            </div>
            <div class="card-wrapper" id="service-list">
                </div>
        </section>

        <hr class="divider">

        <section id="register" class="section">
            <div class="form-container">
                <div class="section-title">
                    <h2>Registrasi Acara</h2>
                    <p>Isi formulir di bawah untuk bergabung dalam acara kami.</p>
                </div>
                
                <form id="eventForm" novalidate>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="fullName">Nama Lengkap</label>
                            <input type="text" id="fullName" placeholder="Masukkan nama sesuai identitas">
                            <span class="error-msg" id="nameError"></span>
                        </div>
                        <div class="input-group">
                            <label for="email">Alamat Email</label>
                            <input type="email" id="email" placeholder="contoh@email.com">
                            <span class="error-msg" id="emailError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="phone">Nomor Telepon / WhatsApp</label>
                            <input type="number" id="phone" placeholder="Contoh: 08123456789">
                            <span class="error-msg" id="phoneError"></span>
                        </div>
                        <div class="input-group">
                            <label for="package">Pilih Paket</label>
                            <select id="package">
                                <option value="basic">Basic Package</option>
                                <option value="premium">Premium Package</option>
                                <option value="custom">Custom Event</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Tipe Kehadiran</label>
                        <div class="radio-options">
                            <label><input type="radio" name="attendance" value="online" checked> Online</label>
                            <label><input type="radio" name="attendance" value="offline"> Offline (On-site)</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Kirim Pendaftaran</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Elite Event Organizer. Tugas Praktikum Pemrograman Web.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
